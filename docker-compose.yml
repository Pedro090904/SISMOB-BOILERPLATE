version: '3.8'

services:
  # Banco de Dados PostgreSQL
  sismob-db:
    image: postgres:15-alpine
    container_name: sismob-postgres
    restart: always
    environment:
      POSTGRES_DB: ${DB_SERVICE_NAME:-postgres}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - sismob_pgdata:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql

  # Interface Visual (Opcional - acesse em http://localhost:5050)
  pgadmin:
    image: dpage/pgadmin4
    container_name: sismob-pgadmin
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@sismob.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - sismob-db

volumes:
  sismob_pgdata:
