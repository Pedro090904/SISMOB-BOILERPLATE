apiVersion: apps/v1
kind: Deployment
metadata:
  name: sismob-app-deployment
spec:
  replicas: 2
  selector:
    matchLabels:
      app: sismob-app-deployment
  template:
    metadata:
      labels:
        app: sismob-app-deployment
    spec:
      imagePullSecrets:
        - name: gitlab-registry
      containers:
        - name: sismob-app-deployment
          image: $CI_REGISTRY_IMAGE:latest
          ports:
            - containerPort: 3000
          envFrom:
            - secretRef:
                name: sismob-app-env
