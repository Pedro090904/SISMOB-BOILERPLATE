stages:
  - build
  - test
  - deploy

# =========================
# VARIÁVEIS GLOBAIS (BUILD)
# =========================
variables:
  DOCKER_HOST: tcp://docker:2375
  DOCKER_TLS_CERTDIR: ""
  DOCKER_DRIVER: overlay2

# =========================
# 1) BUILD + PUSH DA IMAGEM
# =========================
build_image:
  stage: build
  image: docker:27
  services:
    - name: docker:27-dind
  rules:
    - if: $CI_COMMIT_TAG
  before_script:
    - docker login -u "$CI_REGISTRY_USER" -p "$CI_REGISTRY_PASSWORD" "$CI_REGISTRY"
  script:
    - set -e
    - IMAGE="$CI_REGISTRY_IMAGE:$CI_COMMIT_TAG"
    - echo "🔨 Building $IMAGE"
    - docker build -t "$IMAGE" .
    - docker push "$IMAGE"
    - docker tag "$IMAGE" "$CI_REGISTRY_IMAGE:latest"
    - docker push "$CI_REGISTRY_IMAGE:latest"

# =========================
# 2) TESTE DA IMAGEM
# =========================
test_image:
  stage: test
  image: docker:27
  services:
    - name: docker:27-dind
  rules:
    - if: $CI_COMMIT_TAG
  before_script:
    - docker login -u "$CI_REGISTRY_USER" -p "$CI_REGISTRY_PASSWORD" "$CI_REGISTRY"
  script:
    - set -e
    - IMAGE="$CI_REGISTRY_IMAGE:$CI_COMMIT_TAG"
    - echo "🧪 Testing $IMAGE"
    - docker pull "$IMAGE"
    - docker run --rm "$IMAGE" echo "CONTAINER_START_OK"

# =========================
# 3) DEPLOY KUBERNETES
#    (RUNNER LOCAL NA VM)
# =========================
deploy_k8s:
  stage: deploy
  tags:
    - k8s
  rules:
    - if: $CI_COMMIT_TAG
  script:
    - kubectl apply -f k8s/ && kubectl set image deployment/cdp-deployment cdp-deployment=$CI_REGISTRY_IMAGE:$CI_COMMIT_TAG && kubectl rollout status deployment/cdp-deployment
